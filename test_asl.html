<!DOCTYPE html>
<html>
<body style="font-family:monospace;background:#111;color:#eee;padding:20px">
  <h2>ASL Server Test</h2>
  <div style="margin-bottom:10px">
    <label>Server URL:
      <input id="url" value="" style="width:350px;padding:4px;font-family:monospace">
    </label>
    <label style="margin-left:10px">
      <input type="checkbox" id="viz" checked> Show hand traces
    </label>
    <button onclick="toggleConnection()" id="connBtn">Connect</button>
  </div>
  <div style="position:relative;display:inline-block">
    <video id="v" autoplay width="320" style="border:1px solid #444;display:block"></video>
    <canvas id="overlay" width="320" height="240" style="position:absolute;left:0;top:0;pointer-events:none"></canvas>
  </div>
  <div id="status" style="margin:10px 0;color:#aaa">Disconnected</div>
  <div style="margin:4px 0;color:#666;font-size:12px">
    Frames sent: <span id="fc">0</span> | Predictions: <span id="pc">0</span>
  </div>
  <div id="out" style="font-size:28px;color:#00ff88;min-height:40px;margin:10px 0"></div>
  <button onclick="document.getElementById('out').textContent=''">Clear</button>

  <script>
    let socket = null;
    let interval = null;
    let frameCount = 0;
    let predCount = 0;
    let serverConfirmed = false;
    const SEND_INTERVAL_MS = 120; // ~8.3 fps to preserve quality under bandwidth limits
    const SEND_WIDTH = 384;
    const SEND_HEIGHT = 288;

    const video  = document.getElementById('v');
    const status = document.getElementById('status');
    const out    = document.getElementById('out');
    const fc     = document.getElementById('fc');
    const pc     = document.getElementById('pc');
    const urlInput = document.getElementById('url');
    const vizInput = document.getElementById('viz');
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const octx = overlay.getContext('2d');
    if (location.protocol.startsWith('http')) {
      const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
      urlInput.value = `${wsScheme}://${location.host}/asl/ws`;
    } else {
      urlInput.value = 'ws://127.0.0.1:5000/asl/ws';
    }

    function toggleConnection() {
      if (socket && socket.readyState <= 1) {
        socket.send(JSON.stringify({event: 'end'}));
        socket.close();
        socket = null;
        clearInterval(interval);
        document.getElementById('connBtn').textContent = 'Connect';
        status.textContent = '🔴 Disconnected';
        return;
      }
      connect();
    }

    function connect() {
      let url = document.getElementById('url').value;
      if (vizInput.checked) {
        const hasQuery = url.includes('?');
        if (!url.includes('debug=')) {
          url = `${url}${hasQuery ? '&' : '?'}debug=1`;
        }
      }
      status.textContent = '🟡 Connecting...';
      socket = new WebSocket(url);

      socket.onopen = () => {
        status.textContent = '🟡 Socket open, waiting for server event...';
        document.getElementById('connBtn').textContent = 'Disconnect';
      };
      socket.onclose = (e) => {
        status.textContent = `🔴 Disconnected (code=${e.code}, reason=${e.reason || 'none'})`;
        console.warn('WebSocket closed:', e.code, e.reason);
        document.getElementById('connBtn').textContent = 'Connect';
        clearInterval(interval);
        serverConfirmed = false;
        socket = null;
      };
      socket.onerror = (e) => {
        status.textContent = '🔴 Error — check console';
        console.error('WebSocket error:', e);
      };
      socket.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.event === 'asl_result') {
            predCount++;
            pc.textContent = predCount;
            out.textContent += data.word + ' ';
            console.log('Prediction:', data.word, 'confidence:', data.confidence);
          } else if (data.event === 'asl_debug_landmarks') {
            drawLandmarks(data.hands || {}, data.connections || []);
          } else if (data.event === 'asl_status') {
            if (data.phase === 'loading_model') {
              status.textContent = '🟡 Connected, loading ASL model...';
            } else if (data.phase === 'ready') {
              status.textContent = `🟢 ASL model ready (${data.backend || 'unknown'})`;
            } else if (data.phase === 'runtime_error') {
              status.textContent = '🔴 ASL runtime incompatible (deploy Python 3.11.x)';
            } else if (data.phase === 'error') {
              status.textContent = '🔴 ASL model failed to initialize';
            }
          } else if (data.event === 'ping') {
            socket.send(JSON.stringify({event: 'pong', ts: data.ts}));
          } else if (data.event === 'connected') {
            serverConfirmed = true;
            status.textContent = '🟡 Connected to /asl/ws';
            console.log('Server confirmed /asl/ws connection');
            startStreaming();
          } else if (data.event === 'error') {
            status.textContent = '🔴 Server error: ' + data.message;
          }
        } catch (err) {
          console.log('Non-JSON message:', e.data);
        }
      };
    }

    function startStreaming() {
      navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
        video.srcObject = stream;
      });

      video.onloadedmetadata = () => {
        overlay.width = video.clientWidth || 320;
        overlay.height = video.clientHeight || 240;
      };

      // Send a frame every ~67ms = ~15fps
      interval = setInterval(() => {
        if (!socket || socket.readyState !== 1) return;
        if (!serverConfirmed) return;
        if (!video.videoWidth) return;

        canvas.width = SEND_WIDTH;
        canvas.height = SEND_HEIGHT;
        ctx.drawImage(video, 0, 0, SEND_WIDTH, SEND_HEIGHT);
        canvas.toBlob(blob => {
          if (!blob) return;
          const reader = new FileReader();
          reader.onloadend = () => {
            // reader.result is a data URL: "data:image/jpeg;base64,..."
            const b64 = reader.result.split(',')[1];
            socket.send(JSON.stringify({event: 'asl_frame', frame: b64}));
            frameCount++;
            fc.textContent = frameCount;
          };
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.85);
      }, SEND_INTERVAL_MS);
    }

    function drawLandmarks(hands, connections) {
      const w = overlay.width;
      const h = overlay.height;
      octx.clearRect(0, 0, w, h);

      drawHand(hands.left || [], '#00ff88', connections, w, h);
      drawHand(hands.right || [], '#00b7ff', connections, w, h);
    }

    function drawHand(points, color, connections, w, h) {
      if (!points || points.length === 0) return;

      octx.strokeStyle = color;
      octx.lineWidth = 2;
      for (const pair of connections) {
        const a = points[pair[0]];
        const b = points[pair[1]];
        if (!a || !b) continue;
        octx.beginPath();
        octx.moveTo(a[0] * w, a[1] * h);
        octx.lineTo(b[0] * w, b[1] * h);
        octx.stroke();
      }

      octx.fillStyle = color;
      for (const p of points) {
        octx.beginPath();
        octx.arc(p[0] * w, p[1] * h, 3, 0, Math.PI * 2);
        octx.fill();
      }
    }
  </script>
</body>
</html>
